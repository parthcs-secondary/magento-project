<!-- Local Payment Methods -->
<!-- ko if: isActive() -->
<div class="payment-method" data-bind="css: {'_active': (getCode() == isChecked())}" id="payment-method-braintree-lpm">
    <div class="payment-method-title field choice">
        <input type="radio"
               name="payment[method]"
               class="radio"
               data-bind="attr: {'id': getCode()}, value: getCode(), checked: isChecked, click: selectPaymentMethod, visible: isRadioButtonVisible()">
        <label class="label" data-bind="attr: {'for': getCode()}">
            <span text="getTitle()"></span>
        </label>
    </div>
    <div class="payment-method-content">
        <!-- ko foreach: getRegion('messages') -->
        <!-- ko template: getTemplate() --><!-- /ko -->
        <!--/ko-->

        <div class="payment-method-billing-address">
            <!-- ko foreach: $parent.getRegion(getBillingAddressFormName()) -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <div class="checkout-agreements-block">
            <!-- ko foreach: $parent.getRegion('before-place-order') -->
            <!-- ko template: getTemplate() --><!-- /ko -->
            <!--/ko-->
        </div>

        <!-- ko ifnot: paymentMethodsAvailable() -->
        <p class="braintree-lpm-methods" translate="'There are currently no available payment methods with your selected shipping/billing address or cart total.'"></p>
        <!-- /ko -->

        <div class="actions-toolbar braintree-lpm-methods" each="getPaymentMethods()">
            <if args="$parent.isValidCountryAndCurrency(method)">
                <div class="primary">
                    <!-- ko if: method !== 'pay_upon_invoice' -->
                        <button class="action checkout"
                                click="function () { $parent.clickPaymentBtn(method) }"
                                css="$data.method, { disabled: !$parent.isPlaceOrderActionAllowed() }"
                                enabled="($parent.getCode() === $parent.isChecked())">
                            <img attr="{ src: $parent.getPaymentMarkSrc()[method], alt: 'Pay with' + label }">
                        </button>
                    <!-- /ko-->
                    <!-- ko if: method === 'pay_upon_invoice' -->
                        <button class="action checkout"
                                click="function () { $parent.isPui(true) }"
                                css="$data.method, { disabled: !$parent.isPlaceOrderActionAllowed() }"
                                enabled="($parent.getCode() === $parent.isChecked())">
                            <img attr="{ src: $parent.getPaymentMarkSrc()[method], alt: 'Pay with' + label }">
                        </button>
                    <!-- /ko-->
                </div>
                <!-- ko if: $parent.isPui() && method === 'pay_upon_invoice' -->
                    <p data-bind="i18n: 'Once you place an order, pay within 30 days. Our partner Ratepay will send you payment instructions.'"></p>

                    <p data-bind="html: $parent.legalText"></p>
                    <form class="form" data-bind="attr: { id: 'braintree_lpm_' + $data.method + '_form' }">
                        <div class="fieldset">
                            <input id="braintree-lpm-pui-dob" type="hidden">
                            <div data-bind="afterRender: $parent.getDob.bind($parent)"></div>
                        </div>
                    </form>

                    <div class="actions-toolbar">
                        <div class="primary">
                            <button id="pay-upon-invoice-submit-button"
                                class="action primary checkout"
                                type="button"
                                data-bind="css: {'disabled': !$parent.isPlaceOrderActionAllowed()}, click: () => $parent.clickPaymentBtn(method)">
                                <span data-bind="i18n: 'Place Order'"></span>
                            </button>
                        </div>
                    </div>
                <!-- /ko -->
            </if>
        </div>
    </div>
</div>
<!-- /ko -->
